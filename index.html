<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASTRO VR — Solar System Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <div id="app">
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <div class="logo">
          <span class="logo-text">ASTRO <span class="accent">VR</span></span>
        </div>
        <ul class="nav-links">
          <li><a href="#inicio" class="active">Inicio</a></li>
          <li><a href="#fenomenos">Fenómenos</a></li>
          <li><a href="#explorar">Explorar</a></li>
          <li><a href="#vr">VR</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
        <div class="nav-actions">
          <button class="btn-primary-sm">Explorar Ahora</button>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <section class="hero-section">
        <div class="interactive-controls">
          <button class="control-btn" id="btn-solar">
            <i data-lucide="sun"></i>
            <span>Sistema Solar</span>
          </button>
          <button class="control-btn" id="btn-asteroids">
            <i data-lucide="milestone"></i>
            <span>Lluvia de Asteroides</span>
          </button>
          <button class="control-btn" id="btn-blackhole">
            <i data-lucide="circle-dashed"></i>
            <span>Agujero Negro</span>
          </button>
          <button class="control-btn" id="btn-collision">
            <i data-lucide="zap"></i>
            <span>Colisión de Planetas</span>
          </button>
        </div>

        <div class="vr-main-container">
          <div class="vr-window-glow"></div>
          <div class="vr-window" id="vr-window">
            <div class="holographic-overlay"></div>
            
            <!-- Three.js Canvas will be injected here -->
            <div id="three-container"></div>

            <div class="vr-overlay-ui">
              <div class="vr-header">
                <div class="vr-status">
                  <span class="status-indicator"></span>
                  <span id="system-status">SISTEMA SOLAR ACTIVO</span>
                </div>
                <div class="planet-info" id="planet-info">
                  <h2 id="current-planet-name">SISTEMA SOLAR</h2>
                  <p id="planet-details">Exploración a escala representativa</p>
                </div>
              </div>
              
              <div class="planet-selector-bar">
                <button class="planet-btn" data-planet="Sun">Sol</button>
                <button class="planet-btn" data-planet="Mercury">Mercurio</button>
                <button class="planet-btn" data-planet="Venus">Venus</button>
                <button class="planet-btn" data-planet="Earth">Tierra</button>
                <button class="planet-btn" data-planet="Mars">Marte</button>
                <button class="planet-btn" data-planet="Jupiter">Júpiter</button>
                <button class="planet-btn" data-planet="Saturn">Saturno</button>
                <button class="planet-btn" data-planet="Uranus">Urano</button>
                <button class="planet-btn" data-planet="Neptune">Neptuno</button>
              </div>
            </div>

            <div class="loading-screen" id="loading-screen">
              <div class="loader-content">
                <div class="loading-scanner"></div>
                <h1 class="vr-title">ASTRO VR</h1>
                <p class="vr-subtitle">Cargando modelos astronómicos...</p>
                <div class="progress-bar-container">
                  <div class="progress-bar" id="load-progress"></div>
                </div>
              </div>
            </div>

            <div class="corners">
              <div class="corner tl"></div>
              <div class="corner tr"></div>
              <div class="corner bl"></div>
              <div class="corner br"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2026 ASTRO VR — Explorando el universo</p>
        <div class="social-icons">
          <a href="#"><i data-lucide="twitter"></i></a>
          <a href="#"><i data-lucide="instagram"></i></a>
          <a href="#"><i data-lucide="github"></i></a>
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
